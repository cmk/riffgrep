name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94.0"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Formatting
        run: cargo fmt --all -- --check

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # Only the lightweight deps needed for the default suite. CLAP-
        # and FAISS-gated tests skip cleanly via the `requires_clap_model`
        # marker (see scripts/tests/conftest.py). Installing the full
        # pyproject dep set (laion-clap, faiss-cpu, librosa) would add
        # significant CI time and is not required to run the suite.
        # soundfile is omitted: embed_preprocess imports it lazily inside
        # preprocess(), and every test mocks preprocess — so CI never
        # executes a path that touches it.
        run: python -m pip install pytest numpy hypothesis

      - name: Run tests
        run: python -m pytest scripts/tests/ -v
