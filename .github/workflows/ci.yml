name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings -A clippy::collapsible_if -A clippy::field_reassign_with_default -A clippy::unnecessary_cast -A clippy::type_complexity -A clippy::needless_range_loop -A clippy::manual_is_multiple_of -A clippy::useless_vec -A clippy::needless_return -A clippy::derivable_impls -A clippy::manual_contains

      - name: Test
        run: cargo test

      - name: Formatting
        run: cargo fmt --all -- --check
